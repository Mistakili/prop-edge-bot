name: Prop Edge Daily

on:
  schedule:
    # Primary: 6:12 PM WAT / 17:12 UTC
    - cron: "12 17 * * *"
    # MLB pass: 9:12 PM WAT / 20:12 UTC (US afternoon lines often land by then)
    - cron: "12 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  picks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Prop Edge bot
        env:
          PROP_EDGE_LOG_DIR: ${{ github.workspace }}/logs
          BRAIN_STATE_PATH: ${{ github.workspace }}/brain-state.json
        run: node prop-edge-daily.mjs

      - name: Persist brain state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add brain-state.json
          if git diff --staged --quiet; then
            echo "Brain state unchanged"
          else
            git commit -m "chore(brain): update learned weights"
            git push
          fi

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prop-edge-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30